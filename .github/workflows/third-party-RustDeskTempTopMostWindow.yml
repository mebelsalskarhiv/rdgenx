name: build RustDeskTempTopMostWindow

on:
  workflow_call:
    inputs:
        upload-artifact:
          type: boolean
          default: true
        target:
            description: 'Target'
            required: true
            type: string
            default: 'windows-2022'
        configuration:
            description: 'Configuration'
            required: true
            type: string
            default: 'Release'
        platform:
            description: 'Platform'
            required: true
            type: string
            default: 'x64'
        target_version:
            description: 'TargetVersion'
            required: true
            type: string
            default: 'Windows10'
        use_json_secrets:
            description: 'Use JSON secrets instead of zip'
            type: boolean
            default: false

env:
  project_path: WindowInjection/WindowInjection.vcxproj
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-RustDeskTempTopMostWindow:
    runs-on: ${{ inputs.target }}
    strategy:
        fail-fast: false
    env:
      build_output_dir: RustDeskTempTopMostWindow/WindowInjection/${{ inputs.platform }}/${{ inputs.configuration }}
    steps:
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download zip secrets
        if: ${{ inputs.use_json_secrets == false }}
        uses: actions/download-artifact@v4
        with:
          name: encrypted-secrets-zip

      - name: Download JSON secrets
        if: ${{ inputs.use_json_secrets == true }}
        uses: actions/download-artifact@v4
        with:
          name: json-secrets

      - name: Load Secrets from zip
        if: ${{ inputs.use_json_secrets == false }}
        uses: ./.github/actions/decrypt-secrets
        with:
          zip_password: ${{ secrets.ZIP_PASSWORD }}

      - name: Load Secrets from JSON
        if: ${{ inputs.use_json_secrets == true }}
        uses: ./.github/actions/load-json-secrets
        with:
          json_path: secrets.json

      - name: Finalize and Cleanup zip/json
        if: always() # Run even if previous steps fail
        continue-on-error: true
        uses: fjogeleit/http-request-action@v1
        with:
          url: "${{ secrets.GENURL }}/cleanzip"
          method: 'POST'
          customHeaders: '{"Content-Type": "application/json"}'
          data: '{"uuid": "${{ env.uuid }}"}'

      - name: Download the source code
        run: |
          git clone https://github.com/rustdesk-org/RustDeskTempTopMostWindow RustDeskTempTopMostWindow

        # Build. commit 53b548a5398624f7149a382000397993542ad796 is tag v0.3
      - name: Build the project
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 1
          max_attempts: 3
          shell: pwsh
          command: |
            cd RustDeskTempTopMostWindow && git checkout 53b548a5398624f7149a382000397993542ad796
            
            # Read config from secrets.json
            $configPath = "../secrets.json"
            $config = $null
            if (Test-Path $configPath) {
              $config = Get-Content $configPath -Raw | ConvertFrom-Json
            }
            
            # Handle privacy image from URL or base64
            $usePrivacyImage = $false
            if (($env:privacylink_url -and $env:privacylink_url -ne "false") -or ($config -and ($config.privacybase64 -or $config.privacyfile))) {
              $usePrivacyImage = $true
            }
            
            if ($usePrivacyImage) {
              Invoke-WebRequest -Uri https://raw.githubusercontent.com/bryangerlach/rdgen/refs/heads/master/.github/patches/privacyScreen.py -OutFile privacyScreen.py
              
              # Try URL first if available
              if ($env:privacylink_url -and $env:privacylink_url -ne "false") {
                Invoke-WebRequest -Uri "$($env:privacylink_url)/get_png?filename=$($env:privacylink_file)&uuid=$($env:privacylink_uuid)" -OutFile privacy.png
              }
              # Then try base64 fields from config
              elseif ($config -and $config.privacyfile) {
                $base64Data = $config.privacyfile -replace '^data:image/[^;]+;base64,', ''
                [System.IO.File]::WriteAllBytes("privacy.png", [System.Convert]::FromBase64String($base64Data))
              }
              elseif ($config -and $config.privacybase64 -and $config.privacybase64 -ne "[object Object]") {
                $base64Data = $config.privacybase64 -replace '^data:image/[^;]+;base64,', ''
                [System.IO.File]::WriteAllBytes("privacy.png", [System.Convert]::FromBase64String($base64Data))
              }
              
              # Only run if privacy.png was created
              if (Test-Path "privacy.png") {
                python privacyScreen.py
                rm ./WindowInjection/img.cpp -ErrorAction SilentlyContinue
                mv img.cpp ./WindowInjection/img.cpp -ErrorAction SilentlyContinue
              }
            }
            
            msbuild ${{ env.project_path }} -p:Configuration=${{ inputs.configuration }} -p:Platform=${{ inputs.platform }} /p:TargetVersion=${{ inputs.target_version }}

      - name: Archive build artifacts
        uses: actions/upload-artifact@master
        if: ${{ inputs.upload-artifact }}
        with:
            name: topmostwindow-artifacts
            path: |
              ./${{ env.build_output_dir }}/WindowInjection.dll
